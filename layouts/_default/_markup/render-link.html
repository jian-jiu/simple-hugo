<a class="link" href="{{ .Destination | safeURL }}" {{ if and .Title (ne .Title "_blank") }} title="{{ . }}"
    {{ end }}{{ if or (strings.HasPrefix .Destination "http") (eq .Title "_blank") }} target="_blank" rel="noopener"
    {{ end }}>{{ .Text | safeHTML }}
{{ if or (strings.HasPrefix .Destination "http") (eq .Title "_blank") }}
<img src="/images/link.svg">
{{ end }}
</a>
